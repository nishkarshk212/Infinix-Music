<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    
    <linearGradient id="primaryGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="url(#bgGrad)" rx="64"/>
  
  <!-- Music note group -->
  <g filter="url(#glow)">
    <!-- Outer circle -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#primaryGrad)" stroke-width="8" stroke-dasharray="20 10" stroke-linecap="round"/>
    
    <!-- Inner circle -->
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#primaryGrad)" stroke-width="4" opacity="0.6"/>
    
    <!-- Music note -->
    <g transform="translate(256, 256)">
      <!-- Note head 1 -->
      <ellipse cx="-30" cy="40" rx="35" ry="25" fill="url(#primaryGrad)"/>
      <ellipse cx="-30" cy="40" rx="25" ry="17" fill="#1a1a2e"/>
      
      <!-- Note stem 1 -->
      <rect x="-35" y="-120" width="8" height="160" fill="url(#primaryGrad)" rx="4"/>
      
      <!-- Note flag -->
      <path d="M-27,-120 Q30,-100 20,-40 Q-10,-20 -27,-120 Z" fill="url(#primaryGrad)"/>
      
      <!-- Note head 2 -->
      <ellipse cx="35" cy="70" rx="35" ry="25" fill="url(#primaryGrad)"/>
      <ellipse cx="35" cy="70" rx="25" ry="17" fill="#1a1a2e"/>
      
      <!-- Note stem 2 -->
      <rect x="30" y="-90" width="8" height="160" fill="url(#primaryGrad)" rx="4"/>
    </g>
  </g>
  
  <!-- Text "Infinix" -->
  <text x="256" y="380" font-family="'Arial Black', sans-serif" font-size="48" font-weight="900" fill="url(#primaryGrad)" text-anchor="middle" letter-spacing="2">
    INFINIX
  </text>
  
  <!-- Text "Music" -->
  <text x="256" y="430" font-family="'Arial', sans-serif" font-size="36" font-weight="400" fill="url(#primaryGrad)" text-anchor="middle" letter-spacing="4">
    MUSIC
  </text>
</svg>
